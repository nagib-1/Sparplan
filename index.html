<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sparplan</title>
  <link rel="stylesheet" href="style.css">
  <script src="script.js" defer></script>
</head>
<body onload="init()">
  <div class="container">
    <h1>Sparplan</h1>
    
    <!-- Lohnbereich -->
    <section class="section">
      <h2>Monatlicher Lohn</h2>
      <input type="text" placeholder="Monatlicher Lohn in €" id="loan">
      <button onclick="saveSalary()">Lohn speichern</button>
      <button id="editSalaryBtn" onclick="editSalary()" style="display:none;">Lohn bearbeiten</button>
      <div id="salaryDisplay"></div>
    </section>
    
    <!-- Kosten hinzufügen -->
    <section class="section">
      <h2>Kosten hinzufügen</h2>
      <input type="text" placeholder="Name der Kosten" id="costName">
      <select id="costType">
        <option value="">***Kostenart auswählen***</option>
        <option value="fixed">Fixkosten</option>
        <option value="var">Variable Kosten</option>
      </select>
      <select id="rate">
        <option value="">***Intervall auswählen***</option>
        <option value="monthly">Monatlich</option>
        <option value="quarterly">Vierteljährlich</option>
        <option value="semiAnnualy">Halbjährlich</option>
        <option value="annualy">Jährlich</option>
      </select>
      <input type="text" placeholder="Kosten in €" id="costsEuro">
      
      <label>Fälligkeit (1. Zahlung):</label>
      <input type="date" id="dueDate">
      
      <label>Letzte Rate:</label>
      <input type="date" id="lastRate">
      
      <button onclick="addExpense()">Kosten hinzufügen</button>
    </section>
    
    <!-- Sortieren und Liste der monatlichen Kosten -->
    <section class="section">
      <h3>Monatliche Kosten</h3>
      <!-- Sortier-Select -->
      <select id="sortSelect" onchange="sortExpenses()">
        <option value="">Sortieren nach:</option>
        <option value="name_asc">Name aufsteigend</option>
        <option value="name_desc">Name absteigend</option>
        <option value="costType_asc">Kostenart aufsteigend</option>
        <option value="costType_desc">Kostenart absteigend</option>
        <option value="rate_asc">Intervall aufsteigend</option>
        <option value="rate_desc">Intervall absteigend</option>
        <option value="cost_asc">Betrag aufsteigend</option>
        <option value="cost_desc">Betrag absteigend</option>
        <option value="dueDate_asc">Fälligkeit ab aufsteigend</option>
        <option value="dueDate_desc">Fälligkeit ab absteigend</option>
        <option value="lastRate_asc">Fälligkeit bis aufsteigend</option>
        <option value="lastRate_desc">Fälligkeit bis absteigend</option>
      </select>
      <div id="expenseListDisplay"></div>
    </section>
    
    <!-- Übersichtsbereich -->
    <section class="section">
      <h2>Übersicht</h2>
      <button onclick="calculateOverview()">Berechnen</button>
      <button onclick="clearAll()">Alle löschen</button>
      <div id="overview"></div>
    </section>
    
    <!-- Paypal Spendenlink -->
    <footer class="footer">
      <a href="https://www.paypal.com/donate/?hosted_button_id=" target="_blank" class="paypal-button">
        <img src="https://www.paypalobjects.com/webstatic/en_US/i/buttons/PP_logo_h_150x38.png" alt="Spenden mit PayPal">
      </a>
    </footer>
  </div>
</body>
</html>
